name: Deploy Next.js (subfolder) to GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

# Toutes les commandes "run" s'exécutent dans margin-manager/
defaults:
  run:
    working-directory: margin-manager

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: margin-manager/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Build (Next export)
        run: npm run build

      - name: Disable Jekyll
        run: touch out/.nojekyll

      - name: Upload artifact (out/)
        uses: actions/upload-pages-artifact@v3
        with:
          path: margin-manager/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
